<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      color: #333;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    #score-board {
      display: flex;
      gap: 32px;
      margin-bottom: 12px;
      font-size: 1rem;
      color: #555;
    }

    #score-board span { font-weight: bold; color: #333; }

    canvas {
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 4px;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #overlay h2 { font-size: 2rem; color: #333; }
    #overlay p  { color: #666; font-size: 1rem; }

    #play-btn {
      padding: 12px 36px;
      font-size: 1.1rem;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #play-btn:hover { background: #43a047; }

    #controls {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>

  <div id="score-board">
    Score: <span id="score">0</span>
    &nbsp;&nbsp;Best: <span id="best">0</span>
  </div>

  <div style="position:relative; line-height:0;">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <button id="play-btn">Play</button>
    </div>
  </div>

  <div id="controls">Arrow keys or WASD &nbsp;|&nbsp; Pause: Space</div>

  <script>
    const COLS = 20, ROWS = 20;
    const CELL = 20; // canvas / COLS
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg   = document.getElementById('overlay-msg');
    const playBtn = document.getElementById('play-btn');

    const COLORS = {
      snakeHead: '#4CAF50',
      snakeBody: '#66BB6A',
      food:      '#F44336',
      grid:      '#f7f7f7',
    };

    let snake, dir, nextDir, food, score, best, state, loop;
    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function initGame() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      placeFood();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame(); return;
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // Food
      ctx.fillStyle = COLORS.food;
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? COLORS.snakeHead : COLORS.snakeBody;
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 4 : 3);
        ctx.fill();
      });
    }

    function startGame() {
      overlay.style.display = 'none';
      initGame();
      draw();
      state = 'playing';
      clearInterval(loop);
      loop = setInterval(tick, 140);
    }

    function endGame() {
      clearInterval(loop);
      state = 'over';
      overlayTitle.textContent = 'Game Over';
      overlayMsg.textContent = `Score: ${score}`;
      playBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function pauseGame() {
      if (state === 'playing') {
        clearInterval(loop);
        state = 'paused';
        overlayTitle.textContent = 'Paused';
        overlayMsg.textContent = 'Press Space to resume';
        playBtn.textContent = 'Resume';
        overlay.style.display = 'flex';
      } else if (state === 'paused') {
        startGame();
      }
    }

    playBtn.addEventListener('click', startGame);

    document.addEventListener('keydown', e => {
      const key = e.key;

      if (key === ' ') { e.preventDefault(); pauseGame(); return; }
      if (state !== 'playing') return;

      const map = {
        ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
        ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 }, A: { x:-1, y:  0 },
        ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
      };

      const newDir = map[key];
      if (!newDir) return;
      e.preventDefault();

      // Prevent reversing
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;
      nextDir = newDir;
    });

    // Initial draw
    initGame();
    draw();
  </script>
</body>
</html>
